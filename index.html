<!doctype html>
<html lang="en">
<head>
  <title>Rubix Cube</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="favicon.png">
</head>
<body>
  <div id="layout">

    <div id="leftPanel">
      <label class="toggle">Debug<input id="debug" type="checkbox" onchange="debug()"><span></span></label>
      <label class="toggle">Wonky<input id="wonky" type="checkbox" onchange="wonky()"><span></span></label>
      <div id="paint-row">
        <label class="toggle">Paint<input id="paint" type="checkbox" onchange="togglePaintMode()"><span></span></label>
      </div>

      <button onclick="resetCubeState(); updatePolygons(); resetMoveCounter();">Reset</button>
      <button onclick="shuffle()">Shuffle</button>
      <label for="shuffleMoves">Shuffle Moves:</label>
      <input type="number" id="shuffleMoves" name="shuffleMoves" value="18" min="1" max="1000000" />


    </div>

    <div id="main">
      <button id="share-btn" onclick="share()" title="Copy link to clipboard">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
          <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
          <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
        </svg>
        <span id="share-label">Copy link</span>
      </button>
      <h1>Rubix Cube</h1>

      <p>Rotate the cube with the scroll wheel and left + right click.</p>
      <p>The right cube is the view from the other side. It is as if you picked up the left cube and flipped it 180 degrees towards/away from yourself.</p>

      <div id="cubes" oncontextmenu="return false"></div>
    </div>

    <div id="colour-legend"></div>

    <div id="moveHistoryPanel">
      <div id="moveHistoryHeader">&nbsp;&nbsp;No. Move</div>
      <div id="moveHistory"></div>
      <div id="moveHistoryFooter">
        Move: <span id="moveNumber">0</span>
        <button onclick="resetMoveCounter()">Reset</button>
      </div>
    </div>

  </div>

  <div id="movePanel"></div>

  <script src="cube.js"></script>
  <script src="index.js"></script>
</body>
</html>
